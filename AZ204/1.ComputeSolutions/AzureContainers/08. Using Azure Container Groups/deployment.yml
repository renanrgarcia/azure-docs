      username: regdeveus100
      password: 4qkTAAECBtSTMByi38DRh9OSDeb3rRlwiJ7kr14it53RDnQTQa8EJQQJ99CCACYeBjFEqg7NAAACAZCRKv9e

  restartPolicy: Always
type: Microsoft.ContainerInstance/containerGroups